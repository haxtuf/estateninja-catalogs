<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Customer Catalog</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f0f0f1;
        --card: #ffffff;
        --text: #18181b;
        --muted: #6b7280;
        --border: #e4e4e7;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--border);
        background: var(--card);
        height: 56px;
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
      }
      .header-inner img { height: 40px; width: auto; display: block; }
      @media (min-width: 768px) {
        header { height: 64px; }
        .header-inner img { height: 48px; }
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      h1 { margin: 0; font-size: 28px; }
      .estate-logo {
        height: 64px;
        width: auto;
        max-width: 240px;
        object-fit: contain;
      }
      .meta {
        color: var(--muted);
        margin-bottom: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .meta a { color: inherit; text-decoration: underline; }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }
      select {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--card);
        color: var(--text);
        font-size: 14px;
      }
      .pagination {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 24px;
        justify-content: center;
      }
      .pagination button {
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
      }
      .pagination button:hover:not(:disabled) {
        background: var(--bg);
      }
      .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .pagination .page-info {
        color: var(--muted);
        font-size: 14px;
        padding: 0 8px;
      }
      .loading-skeleton {
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }
      .card {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 16px;
        padding: 0;
        text-align: left;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
      .image {
        width: 100%;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        border-radius: 16px 16px 0 0;
        background: #d4d4d8;
      }
      .image img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .placeholder { width: 100%; height: 100%; background: #d4d4d8; }
      .title { padding: 12px 14px 14px; font-weight: 600; }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal.open { display: flex; }
      .modal-card {
        max-width: 640px;
        width: 100%;
        background: var(--card);
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 18px;
      }
      .modal-title { font-weight: 600; margin: 0 0 12px; }
      .modal-body { max-height: 60vh; overflow-y: auto; white-space: pre-wrap; color: var(--text); }
      .modal-close {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        border-radius: 999px;
        padding: 6px 12px;
        cursor: pointer;
      }
    </style>
  </head>

    <div class="modal" id="detailModal">
      <div class="modal-card">
        <div style="display:flex; justify-content: space-between; gap: 12px; align-items:center;">
          <p class="modal-title" id="modalTitle"></p>
          <button class="modal-close" id="modalClose">Close</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
    <script>
      const grid = document.getElementById("catalogGrid");
      const filter = document.getElementById("categoryFilter");
      const modal = document.getElementById("detailModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalBody = document.getElementById("modalBody");
      const modalClose = document.getElementById("modalClose");
      const prevPageBtn = document.getElementById("prevPage");
      const nextPageBtn = document.getElementById("nextPage");
      const pageInfo = document.getElementById("pageInfo");

      const ITEMS_PER_PAGE = 50;
      let currentPage = 1;
      let filteredCards = [];

      const applyFilter = () => {
        const value = filter.value;
        const allCards = Array.from(grid.querySelectorAll(".card"));

        filteredCards = allCards.filter((card) => {
          return value === "all" || card.dataset.category === value;
        });

        currentPage = 1;
        renderPage();
      };

      const renderPage = () => {
        const allCards = Array.from(grid.querySelectorAll(".card"));
        const totalPages = Math.ceil(filteredCards.length / ITEMS_PER_PAGE);
        const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
        const endIdx = startIdx + ITEMS_PER_PAGE;

        // Hide all cards first
        allCards.forEach(card => card.style.display = "none");

        // Show only cards for current page
        filteredCards.slice(startIdx, endIdx).forEach(card => {
          card.style.display = "";
        });

        // Update pagination controls
        pageInfo.textContent = "Page " + currentPage + " of " + (totalPages || 1) + " (" + filteredCards.length + " items)";
        prevPageBtn.disabled = currentPage === 1;
        nextPageBtn.disabled = currentPage >= totalPages;

        // Scroll to top on page change
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      filter.addEventListener("change", applyFilter);

      prevPageBtn.addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          renderPage();
        }
      });

      nextPageBtn.addEventListener("click", () => {
        const totalPages = Math.ceil(filteredCards.length / ITEMS_PER_PAGE);
        if (currentPage < totalPages) {
          currentPage++;
          renderPage();
        }
      });

      applyFilter();

      grid.addEventListener("click", (event) => {
        const target = event.target.closest(".card");
        if (!target) return;
        modalTitle.textContent = target.dataset.title || "Item";
        modalBody.textContent = target.dataset.description || "";
        modal.classList.add("open");
      });

      modalClose.addEventListener("click", () => modal.classList.remove("open"));
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          modal.classList.remove("open");
        }
      });
    </script>
